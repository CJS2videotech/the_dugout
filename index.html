<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Office Dugout</title>

<!-- iOS/Android Home Screen App Icons & PWA Capabilities -->
<link rel="apple-touch-icon" href="assets/Button%20OD%20team.png">
<link rel="icon" type="image/png" href="assets/Button%20OD%20team.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Office Dugout">
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090d14; --card:rgba(20, 25, 35, 0.45); --card2:rgba(30, 40, 60, 0.35);
  --border:rgba(255,255,255,0.12); --border-light:rgba(255,255,255,0.22);
  --text:#e8edf5; --muted:#cbd5e1;
  --green:#22c55e;
  
  /* User Themes */
  --u-andrea-1: #0a2351; --u-andrea-2: #ffc52f;
  --u-cj-1: #0e3386; --u-cj-2: #cc3433;
  --u-brennan-1: #27251f; --u-brennan-2: #fd5a1e;
  --u-dominic-1: #0c2340; --u-dominic-2: #ffffff;
  --u-mario-1: #002b5c; --u-mario-2: #e31937;
}
body{
  font-family:'Inter',system-ui,sans-serif;
  background-color:var(--bg); color:var(--text); min-height:100vh;
  background-image: url('assets/OD%20background.png');
  background-size: cover;
  background-position: center top;
  background-attachment: fixed;
}
.glass{ 
  background: var(--card);
  backdrop-filter: blur(16px); 
  -webkit-backdrop-filter: blur(16px); 
  border: 1px solid var(--border);
  border-top: 1px solid var(--border-light);
  border-left: 1px solid var(--border-light);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
}

/* ── HEADER ── */
.hdr{
  background:var(--card); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
  display:flex; justify-content:space-between; align-items:center;
  padding:1rem 2rem;
}
.logo-wrap{
  display:flex; flex-direction:column; align-items:center; line-height:1;
}
.logo-main{
  font-family:'Graduate', serif; font-size: 2rem;
  color: #fff; letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 2px 2px 0 #cc3433, -1px -1px 0 #0e3386, 1px -1px 0 #0e3386, -1px 1px 0 #0e3386, 1px 1px 0 #0e3386;
}
.live-col{ display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.live-row{ display:flex; align-items:center; gap:4px; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; color:var(--muted); }
.pulse{ width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── LEADERBOARDS ── */
.boards-section{ padding: 2rem; max-width: 1400px; margin: 0 auto; display:flex; gap:2rem; flex-wrap:wrap; }
.board{ flex:1; min-width:320px; background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.board-header{
  padding: 1rem; border-bottom:1px solid var(--border);
  font-family:'Oswald',sans-serif; font-size:1.2rem; letter-spacing:1px; text-transform:uppercase;
  display:flex; align-items:center; justify-content:space-between; background:var(--card2);
}
.board-header > div{display:flex; align-items:center; gap:8px;}
.b-pip{width:8px; height:8px; border-radius:50%; background:#fff;}
table{width:100%; border-collapse:collapse; font-size:13px; text-align:right;}
th{ font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); padding:10px; border-bottom:1px solid var(--border); font-weight:400; background:rgba(0,0,0,0.2); }
td{ padding:12px 10px; border-bottom:1px solid var(--border); color:var(--muted); }
th:first-child, td:first-child{ text-align:left; }
.team-name{ font-family:'Oswald',sans-serif; font-size:15px; color:#fff; letter-spacing:0.5px; }
.bld{ color:#fff; font-weight:600; }
.stk{ padding:2px 6px; border-radius:4px; font-family:'Oswald',sans-serif; font-size:10px; }
.stk-w{ background:rgba(34,197,94,.12); color:#4ade80; }
.stk-l{ background:rgba(239,68,68,.12); color:#f87171; }

.row-andrea{ border-left: 3px solid var(--u-andrea-2); }
.row-cj{ border-left: 3px solid var(--u-cj-2); }
.row-brennan{ border-left: 3px solid var(--u-brennan-2); }
.row-dominic{ border-left: 3px solid var(--u-dominic-2); }
.row-mario{ border-left: 3px solid var(--u-mario-2); }

/* ── MAIN GRID ── */
.main-grid{
  display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:1.5rem;
  padding: 0 2rem 3rem; max-width:1400px; margin: 0 auto;
}
.user-col{
  display:flex; flex-direction:column; gap:1rem;
}
.user-hdr{
  background: var(--card); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; text-align:center; position:relative;
}
.uh-top{ height:6px; width:100%; }
.uh-inner{ padding: 1.25rem 1rem; }
.uh-name{ font-family:'Graduate', serif; font-size:1.4rem; letter-spacing:1px; margin-bottom:4px; }
.uh-team{ font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); opacity: 0.9; }

/* ── GAME CARDS ── */
.gcard{ background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1rem; position:relative;}
.gcard-live{ border-color:var(--green) !important; box-shadow: 0 0 15px rgba(34,197,94,0.3); }
.live-badge{ position:absolute; top:-8px; left:50%; transform:translateX(-50%); background:var(--green); color:#000; font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; padding:2px 8px; border-radius:12px; font-weight:700;}

.matchup{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:.5rem; text-align:center; }
.tm{ display:flex; flex-direction:column; gap:2px; }
.tm.home{text-align:right;} .tm.away{text-align:left;}
.tm-abbr{ font-family:'Oswald',sans-serif; font-size:1.3rem; font-weight:700; }
.tm-rec{ font-size:11px; color:var(--muted); font-family:'Oswald',sans-serif;}
.dim{ opacity:0.4; }
.smid{ display:flex; flex-direction:column; align-items:center; gap:2px; min-width:60px; }
.score{ font-family:'Oswald',sans-serif; font-size:1.6rem; font-weight:700; letter-spacing:1px; line-height:1; }
.vs-txt{ font-size:12px; color:var(--muted); }
.gstat{ font-family:'Oswald',sans-serif; font-size:11px; text-transform:uppercase; color:var(--muted); }
.gstat.live{ color:var(--green); }
.gfooter{ margin-top:.75rem; padding-top:.5rem; border-top:1px solid var(--border); display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }
.gtba{ text-align:center; font-style:italic; font-size:13px; color:var(--muted); padding:1rem 0; }

.sched-title{ font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; text-align:center; }
.sched-list{ display:flex; flex-direction:column; gap:8px; }
.mini-game{ display:flex; justify-content:space-between; background:var(--card2); border:1px solid var(--border); border-radius:6px; padding:8px 10px; font-size:12px; align-items:center;}
.mg-date{ font-family:'Oswald',sans-serif; color:var(--muted); width:45px; }
.mg-match{flex:1; text-align:center; font-weight:500;}
.mg-time{ color:var(--muted); font-size:11px; text-align:right;}

/* ── ROSTER & MODAL ── */
.roster-sec{ max-width:1400px; margin:0 auto 2rem; padding: 0 2rem; }
.roster-wrap{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; }
.react-head{ display:flex; align-items:center; gap:8px; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
.roster-grid{ display:flex; justify-content:center; gap:2.5rem; flex-wrap:wrap; padding: 1rem 0; }
.roster-thumb{ width:120px; height:150px; border-radius:18px; object-fit:cover; object-position:top; border:3px solid var(--border-light); cursor:pointer; transition:transform .2s, box-shadow .2s; box-shadow:0 6px 15px rgba(0,0,0,0.6); }
.roster-thumb:hover{ transform:scale(1.08); box-shadow:0 10px 25px rgba(255,255,255,0.2); }

.modal-overlay{ position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:999; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .3s; }
.modal-overlay.open{ opacity:1; pointer-events:auto; }
.modal-content{ max-width:450px; width:90%; border-radius:16px; padding:2rem; position:relative; transform:translateY(20px); transition:transform .3s; display:flex; flex-direction:column; gap:1.5rem; text-align:center; }
.modal-overlay.open .modal-content{ transform:translateY(0); }
.modal-close{ position:absolute; top:1rem; right:1.5rem; background:transparent; border:none; color:var(--muted); font-size:2rem; cursor:pointer; transition:color .2s; line-height:1; }
.modal-close:hover{ color:#fff; }
.modal-img{ width:300px; height:380px; border-radius:16px; object-fit:cover; object-position:top; border:4px solid var(--border-light); margin:0 auto; box-shadow:0 10px 35px rgba(0,0,0,0.8); }
.modal-info{ font-family:'Oswald',sans-serif; }
.modal-name{ font-size:2.2rem; letter-spacing:1px; line-height:1; margin-bottom:5px; text-shadow:0 2px 4px rgba(0,0,0,0.8); }
.modal-team{ font-size:1.2rem; color:var(--text); letter-spacing:2px; text-transform:uppercase; margin-bottom:15px; }

.modal-daily-tbl table{ width:100%; border-collapse:collapse; font-size:10px; margin-top:5px; }
.modal-daily-tbl th{ color:var(--muted); font-weight:400; text-align:right; padding:4px; border-bottom:1px solid var(--border); }
.modal-daily-tbl th:first-child{ text-align:left; }
.modal-daily-tbl td{ color:var(--text); text-align:right; padding:6px 4px; border-bottom:1px solid var(--border); }
.modal-daily-tbl td:first-child{ text-align:left; color:#fff; font-family:'Oswald',sans-serif; text-transform:uppercase; }
.modal-daily-tbl .bld{ color:#fff; font-weight:700; }
.modal-daily-tbl .dim{ opacity:0.4; }
.modal-daily-tbl .team-name{ font-size:12px; font-weight:600; padding-right:5px; }

/* ── REFRESH ── */
.rbtn{ background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:6px; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .2s;}
.rbtn:hover{ color:#fff; border-color:#fff; }
.spin{width:12px; height:12px; border:2px solid rgba(255,255,255,.1); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none;}
.is-loading .spin{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

footer{ text-align:center; padding:2rem 1rem; font-size:12px; color:var(--muted); border-top:1px solid var(--border); margin-top:2rem;}
@media(max-width:768px){ body{ background-image: url('assets/OD%20phone%20background.png'); } .boards-section{ flex-direction:column; padding:1rem; } .main-grid, .roster-sec{ padding:0 1rem 2rem; } .hdr{ padding:1rem; flex-direction:column; gap:10px; } .roster-thumb{ width:90px; height:120px; } }
</style>
</head>
<body>

<div class="hdr glass">
  <div class="logo-wrap">
    <div class="logo-main">Office Dugout</div>
  </div>
  <div class="live-col">
    <div class="live-row"><span class="pulse"></span>LIVE DATA FEED</div>
    <div id="hdr-time" style="font-size:13px; font-weight:500;">–</div>
  </div>
</div>

<div class="boards-section">
  <!-- Standings -->
  <div class="board glass">
    <div class="board-header">
      <div><div class="b-pip" style="background:#3b82f6;"></div>Season Standings</div>
      <button class="rbtn" id="btn-refresh" onclick="refreshAll()"><div class="spin"></div>Refresh</button>
    </div>
    <table>
      <thead><tr><th>Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>STK</th></tr></thead>
      <tbody id="tbl-standings"><tr><td colspan="6" style="text-align:center">Loading...</td></tr></tbody>
    </table>
  </div>
  <!-- Daily Leader -->
  <div class="board glass">
    <div class="board-header">
      <div><div class="b-pip" style="background:#ef4444;"></div>Daily Leader</div>
      <span style="font-size:11px; color:var(--muted); font-weight:400; text-transform:none; letter-spacing:0;">Sort: Runs > Hits</span>
    </div>
    <table>
      <thead><tr><th>Team</th><th>Runs</th><th>Hits</th><th>Status</th></tr></thead>
      <tbody id="tbl-daily"><tr><td colspan="4" style="text-align:center">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="roster-sec">
  <div class="roster-wrap glass">
    <div class="react-head"><div class="b-pip" style="background:#a855f7; width:6px; height:6px;"></div>Team Roster</div>
    <div class="roster-grid" id="roster-grid">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<div class="modal-overlay" id="roster-modal" onclick="closeModal(event)">
  <div class="modal-content glass" id="modal-body">
    <!-- Populated by JS -->
  </div>
</div>

<div class="main-grid" id="users-grid">
  <!-- Populated by JS -->
</div>

<footer>Data via MLB Stats API · Auto-refreshes every 60s</footer>

<script>
const USERS = [
  { id: 'andrea', name: 'Andrea', teamName: 'Brewers', teamId: 158, primary: 'var(--u-andrea-1)', secondary: 'var(--u-andrea-2)', img: 'assets/andrea.jpg' },
  { id: 'cj', name: 'CJ', teamName: 'Cubs', teamId: 112, primary: 'var(--u-cj-1)', secondary: 'var(--u-cj-2)', img: 'assets/cj.jpg' },
  { id: 'brennan', name: 'Brennan', teamName: 'Giants', teamId: 137, primary: 'var(--u-brennan-1)', secondary: 'var(--u-brennan-2)', img: 'assets/Brennan.jpg' },
  { id: 'dominic', name: 'Dominic', teamName: 'Yankees', teamId: 147, primary: 'var(--u-dominic-1)', secondary: 'var(--u-dominic-2)', img: 'assets/Dominic.jpg', glow: 'text-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 20px rgba(255,255,255,0.4);' },
  { id: 'mario', name: 'Mario', teamName: 'Guardians', teamId: 114, primary: 'var(--u-mario-1)', secondary: 'var(--u-mario-2)', img: 'assets/Mario.jpg' }
];
const TEAM_IDS = USERS.map(u => u.teamId).join(',');

const MLB = 'https://statsapi.mlb.com/api/v1';

function getTeamStyle(id, defColor='#fff') {
  const matched = USERS.find(u => u.teamId === id);
  if (!matched) return `color:${defColor};`;
  return `color:${matched.secondary};${matched.glow||''}`;
}

/* ── HELPERS ── */
function pad(n){return String(n).padStart(2,'0')}
function isoDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function fmtDate(str){
  const d=new Date(str+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
}
function fmtTime(isoStr){
  return new Date(isoStr).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

/* ── ROSTER & MODAL ── */
function initRoster(){
  const grid = document.getElementById('roster-grid');
  grid.innerHTML = USERS.map(u => `
    <img src="${u.img}" class="roster-thumb" style="border-color:${u.secondary}" onclick="openModal('${u.id}')" alt="${u.name}">
  `).join('');
}

function openModal(id) {
  const u = USERS.find(x => x.id === id);
  if(!u) return;
  const body = document.getElementById('modal-body');
  
  const todayEl = document.getElementById(`today-${id}`);
  const todayHtml = todayEl ? todayEl.innerHTML : '';

  const dailyEl = document.getElementById('tbl-daily');
  const dailyHtml = dailyEl ? `
    <div class="modal-daily-tbl" style="background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; margin-top:15px; text-align:left;">
      <div style="font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; display:flex; align-items:center; gap:6px;">
        <div class="b-pip" style="background:#ef4444;width:6px;height:6px;"></div>Daily Leader
      </div>
      <table>
        <thead><tr><th>Team</th><th>Runs</th><th>Hits</th><th>Status</th></tr></thead>
        <tbody>${dailyEl.innerHTML}</tbody>
      </table>
    </div>
  ` : '';

  body.innerHTML = `
    <button class="modal-close" onclick="closeModal(event)">&times;</button>
    <img src="${u.img}" class="modal-img" style="border-color:${u.secondary}">
    <div class="modal-info">
      <div style="display:flex; justify-content:center; align-items:center; gap:12px; margin-bottom:5px;">
        <div class="modal-name" style="color:${u.secondary};${u.glow||''} margin-bottom:0;">${u.name}</div>
        <img src="https://www.mlbstatic.com/team-logos/${u.teamId}.svg" style="width:36px; height:36px; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.6)) ${u.teamId === 147 ? 'brightness(0) invert(1)' : ''};">
      </div>
      <div class="modal-team">${u.teamName}</div>
      <div style="text-align:left; max-width:100%; margin:0 auto; max-height: 40vh; overflow-y:auto; overflow-x:hidden; padding-right:10px;">
        <div style="font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px;">
          <div class="b-pip" style="background:var(--green);width:6px;height:6px;"></div>Today's Matchup
        </div>
        ${todayHtml}
        ${dailyHtml}
      </div>
    </div>
  `;
  document.getElementById('roster-modal').classList.add('open');
}
function closeModal(e) {
  if (e && (e.target.id === 'roster-modal' || e.target.classList.contains('modal-close'))) {
    document.getElementById('roster-modal').classList.remove('open');
  } else if (!e) {
    document.getElementById('roster-modal').classList.remove('open');
  }
}

/* ── INITIAL RENDER ── */
function initLayout(){
  const g = document.getElementById('users-grid');
  let html = '';
  USERS.forEach(u => {
    html += `
    <div class="user-col" id="col-${u.id}">
      <div class="user-hdr glass" style="border-bottom: 3px solid ${u.secondary}">
        <div class="uh-top" style="background:${u.primary}"></div>
        <div class="uh-inner" style="display:flex; align-items:center; justify-content:center; gap:12px;">
          <div style="text-align:right;">
            <div class="uh-name" style="color:${u.secondary};${u.glow||''}">${u.name}</div>
            <div class="uh-team" style="color:${u.secondary};${u.glow||''}">${u.teamName}</div>
          </div>
          <img src="https://www.mlbstatic.com/team-logos/${u.teamId}.svg" alt="logo" style="width:42px; height:42px; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.6)) ${u.teamId === 147 ? 'brightness(0) invert(1)' : ''};">
        </div>
      </div>
      <div id="today-${u.id}"><div class="gtba">Loading Today's Game...</div></div>
      <div class="sched-title">Next 5 Days</div>
      <div class="sched-list" id="sched-${u.id}"></div>
      <div id="standings-${u.id}" style="margin-top:auto;"></div>
    </div>`;
  });
  g.innerHTML = html;
  initRoster();
}

/* ── FULL GAME RENDERER ── */
function renderGame(g, isSchedule=false){
  const away=g.teams.away, home=g.teams.home;
  const awayId=away.team.id, homeId=home.team.id;
  const aSty = getTeamStyle(awayId, '#fff');
  const hSty = getTeamStyle(homeId, '#fff');
  const status=g.status.abstractGameState; 
  const isLive=status==='Live', isFinal=status==='Final';
  const awayS=away.score??'', homeS=home.score??'';
  const hasScore=isLive||isFinal;
  const awayW=isFinal&&parseInt(awayS)>parseInt(homeS);
  const homeW=isFinal&&parseInt(homeS)>parseInt(awayS);
  
  let ss='', sc='', badge='';
  if(isLive){
    const inn=g.linescore?.currentInningOrdinal||'';
    const half=g.linescore?.inningHalf||'';
    ss=`${half} ${inn}`.trim(); sc='live';
    badge=`<div class="live-badge">LIVE</div>`;
  } else if(isFinal){ ss='Final'; } else { ss=fmtTime(g.gameDate); }

  if(isSchedule){
    // Compact row
    return `<div class="mini-game">
      <span class="mg-date">${fmtDate(g.gameDate.split('T')[0])}</span>
      <span class="mg-match"><span style="${aSty}font-weight:${USERS.some(u=>u.teamId===awayId)?'700':'500'}">${away.team.abbreviation}</span> @ <span style="${hSty}font-weight:${USERS.some(u=>u.teamId===homeId)?'700':'500'}">${home.team.abbreviation}</span></span>
      <span class="mg-time">${ss}</span>
    </div>`;
  }

  let cardHtml = `<div class="gcard glass ${isLive?'gcard-live':''}">
    ${badge}
    <div class="matchup">
      <div class="tm away">
        <div class="tm-abbr ${isFinal&&!awayW?'dim':''}" style="${aSty}">${away.team.abbreviation||away.team.name}</div>
        <div class="tm-rec">${away.leagueRecord?`${away.leagueRecord.wins}-${away.leagueRecord.losses}`:''}</div>
      </div>
      <div class="smid">
        ${hasScore?`<div class="score">${awayS}–${homeS}</div>`:`<div class="vs-txt">vs</div>`}
        <div class="gstat ${sc}">${ss}</div>
      </div>
      <div class="tm home">
        <div class="tm-abbr ${isFinal&&!homeW?'dim':''}" style="${hSty}">${home.team.abbreviation||home.team.name}</div>
        <div class="tm-rec">${home.leagueRecord?`${home.leagueRecord.wins}-${home.leagueRecord.losses}`:''}</div>
      </div>
    </div>
    <div class="gfooter"><span>${g.venue?.name||''}</span></div>`;

  if(!isSchedule){
    let awayP = away.probablePitcher?.fullName || 'TBD';
    let homeP = home.probablePitcher?.fullName || 'TBD';
    if(awayP !== 'TBD' || homeP !== 'TBD') {
        cardHtml += `<div style="font-size:10px;text-align:center;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);">
          <div style="display:flex; justify-content:space-between;">
            <span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${awayP}</span>
            <span style="opacity:0.5;margin:0 4px;">vs</span>
            <span style="flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${homeP}</span>
          </div>
        </div>`;
    }
  }

  cardHtml += `</div>`;
  return cardHtml;
}

/* ── SCORE RENDER & DAILY LEADER ── */
async function loadScores(){
  const todayStr=isoDate(new Date());
  const url=`${MLB}/schedule?sportId=1&date=${todayStr}&teamId=${TEAM_IDS}&hydrate=team,linescore,leagueRecord,probablePitcher`;
  try {
    const r=await fetch(url);
    if(!r.ok) throw new Error();
    const data=await r.json();
    const games=data.dates?.[0]?.games||[];

    let dailyData = [];

    USERS.forEach(u => {
      // Find game for this user
      let g = games.find(gm => gm.teams.away.team.id===u.teamId || gm.teams.home.team.id===u.teamId);
      
      let runs=0, hits=0, pending=true, matchTxt="No Game";
      if(g){
        document.getElementById(`today-${u.id}`).innerHTML = renderGame(g);
        let tr = g.teams.away.team.id === u.teamId ? 'away' : 'home';
        let st = g.status.abstractGameState;
        if(st==='Live' || st==='Final'){
           runs = g.teams[tr].score||0;
           hits = g.linescore?.teams?.[tr]?.hits||0;
           pending=false;
           matchTxt = st==='Live' ? 'In Progress' : 'Final';
        } else {
           matchTxt = "Scheduled";
        }
      } else {
        document.getElementById(`today-${u.id}`).innerHTML = `<div class="gtba">No Game Today</div>`;
      }
      
      dailyData.push({ u, runs, hits, pending, matchTxt });
    });

    // Daily Sort
    dailyData.sort((a,b)=>{
      if(a.pending && !b.pending) return 1;
      if(b.pending && !a.pending) return -1;
      if(a.runs !== b.runs) return b.runs - a.runs;
      return b.hits - a.hits;
    });

    let html = dailyData.map(d => `
      <tr class="row-${d.u.id}">
        <td><span class="team-name" style="color:${d.u.secondary};${d.u.glow||''}">${d.u.teamName}</span><br><span style="font-size:10px;text-transform:uppercase;">${d.u.name}</span></td>
        <td class="bld ${!d.pending?'':'dim'}">${d.pending ? '—' : d.runs}</td>
        <td class="${!d.pending?'':'dim'}">${d.pending ? '—' : d.hits}</td>
        <td style="${d.pending?'font-style:italic;':''}">${d.pending?'Pending':d.matchTxt}</td>
      </tr>
    `).join('');
    document.getElementById('tbl-daily').innerHTML = html;

  } catch(e) {
    document.getElementById('tbl-daily').innerHTML = '<tr><td colspan="4">Error loading data.</td></tr>';
  }
}

/* ── STANDINGS ── */
async function loadStandings(){
  const yr=new Date().getFullYear();
  const url=`${MLB}/standings?leagueId=103,104&season=${yr}&standingsTypes=regularSeason&hydrate=team,division`;
  try {
    const r=await fetch(url);
    if(!r.ok) throw new Error();
    const data=await r.json();
    
    // 1. Setup column division standings for each user
    USERS.forEach(u => {
      let divGroup = data.records.find(gr => gr.teamRecords.some(tr => tr.team.id === u.teamId));
      if(divGroup) {
        let divName = divGroup.league?.name || 'Division';
        if (divGroup.division?.nameShort) {
            divName = divGroup.division.nameShort + ' Standings';
        } else if (divGroup.division?.name) {
            divName = divGroup.division.name + ' Standings';
        }
        
        let divHtml = divGroup.teamRecords.map(tr => {
          const pct = parseFloat(tr.winningPercentage||0).toFixed(3).replace(/^0/,'.');
          const gb = tr.gamesBack==='-'||tr.gamesBack==='0'?'—':tr.gamesBack;
          const isTarget = tr.team.id === u.teamId;
          const teamName = tr.team.teamName || tr.team.name;
          const trSty = getTeamStyle(tr.team.id, isTarget ? '#fff' : 'var(--muted)');
          return `
            <div style="display:flex; justify-content:space-between; align-items:center; padding: 4px 0; border-bottom: 1px solid var(--border); font-weight:${isTarget ? '600' : 'normal'}; ${trSty}">
              <span style="flex:1; text-align:left; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${teamName}">${teamName}</span>
              <span style="width:20px; text-align:right; font-size:11px;">${tr.wins}</span>
              <span style="width:20px; text-align:right; font-size:11px;">${tr.losses}</span>
              <span style="width:34px; text-align:right; font-size:11px;">${pct}</span>
              <span style="width:24px; text-align:right; font-size:11px;">${gb}</span>
            </div>
          `;
        }).join('');
        
        const stEl = document.getElementById(`standings-${u.id}`);
        if(stEl) {
          stEl.innerHTML = `
            <div style="margin-top:15px; padding: 12px; background:var(--card2); border-radius:8px; border:1px solid var(--border);">
              <div style="font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; color:var(--muted); margin-bottom:6px; text-transform:uppercase;">${divName}</div>
              <div style="display:flex; justify-content:space-between; align-items:center; font-size:9px; color:var(--muted); text-transform:uppercase; padding-bottom:4px; border-bottom:1px solid var(--border);">
                <span style="flex:1; text-align:left;">Team</span>
                <span style="width:20px; text-align:right;">W</span>
                <span style="width:20px; text-align:right;">L</span>
                <span style="width:34px; text-align:right;">PCT</span>
                <span style="width:24px; text-align:right;">GB</span>
              </div>
              <div style="display:flex; flex-direction:column;">
                ${divHtml}
              </div>
            </div>
          `;
        }
      }
    });

    // 2. Setup combined standings leaderboard
    let rows = [];
    data.records.forEach(gr => {
      gr.teamRecords.forEach(tr => {
        let matched = USERS.find(u => u.teamId === tr.team.id);
        if(matched) rows.push({...tr, user:matched});
      });
    });

    rows.sort((a,b) => parseFloat(b.winningPercentage||0) - parseFloat(a.winningPercentage||0));

    let html = rows.map(r => {
      const pct = parseFloat(r.winningPercentage||0).toFixed(3).replace(/^0/,'.');
      const gb=r.gamesBack==='-'||r.gamesBack==='0'?'—':r.gamesBack;
      const streak=r.streak?.streakCode||'';
      const sc=streak.startsWith('W')?'stk-w':'stk-l';
      
      return `<tr class="row-${r.user.id}">
        <td><span class="team-name" style="color:${r.user.secondary};${r.user.glow||''}">${r.team.teamName}</span><br><span style="font-size:10px;text-transform:uppercase;">${r.user.name}</span></td>
        <td class="bld">${r.wins}</td>
        <td>${r.losses}</td>
        <td class="bld">${pct}</td>
        <td>${gb}</td>
        <td>${streak?`<span class="stk ${sc}">${streak}</span>`:'—'}</td>
      </tr>`;
    }).join('');
    
    document.getElementById('tbl-standings').innerHTML = html || '<tr><td colspan="6">No regular season data yet.</td></tr>';
  } catch(e) {
    document.getElementById('tbl-standings').innerHTML = '<tr><td colspan="6">Error loading standings.</td></tr>';
  }
}

/* ── SCHEDULE ── */
async function loadSchedule(){
  const today=new Date(); today.setDate(today.getDate()+1); // Tomorrow
  const end=new Date(today); end.setDate(end.getDate()+14);
  const startStr=isoDate(today), endStr=isoDate(end);
  
  const url=`${MLB}/schedule?sportId=1&startDate=${startStr}&endDate=${endStr}&teamId=${TEAM_IDS}&hydrate=team,leagueRecord&gameType=R`;
  try {
    const r=await fetch(url);
    if(!r.ok) throw new Error();
    const data=await r.json();
    const games = [];
    (data.dates||[]).forEach(d => {
      (d.games||[]).forEach(g => { games.push(g); });
    });

    USERS.forEach(u => {
      const uGames = games.filter(g => g.teams.away.team.id===u.teamId || g.teams.home.team.id===u.teamId);
      const next5 = uGames.slice(0,5);
      if(next5.length===0){
        document.getElementById(`sched-${u.id}`).innerHTML = '<div class="gtba">No upcoming games</div>';
      } else {
        document.getElementById(`sched-${u.id}`).innerHTML = next5.map(g => renderGame(g, true)).join('');
      }
    });

  } catch(e) {
    USERS.forEach(u => {
      document.getElementById(`sched-${u.id}`).innerHTML = '<div class="gtba">Error loading...</div>';
    });
  }
}

/* ── CLOCK & REFRESH ── */
function tick(){document.getElementById('hdr-time').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
tick(); setInterval(tick,10000);

async function refreshAll(){
  const btn = document.getElementById('btn-refresh'); if(btn) btn.classList.add('is-loading');
  await Promise.all([loadScores(), loadStandings(), loadSchedule()]);
  if(btn) btn.classList.remove('is-loading');
}

initLayout();
refreshAll();
setInterval(loadScores, 60000);

</script>
